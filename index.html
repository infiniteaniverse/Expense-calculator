<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpendSense — Expense Tracker</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <style>
    /* =============================================
        RESET & BASE STYLES
       ============================================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #0f1117;
      color: #e0e6f0;
      min-height: 100vh;
    }

    /* =============================================
        HEADER / NAVBAR
       ============================================= */
    header {
      background-color: #1a1f2e;
      border-bottom: 2px solid #2a3044;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #f5c542;
    }

    .logo span {
      color: #ffffff;
    }

    #current-date {
      font-size: 13px;
      color: #6b7a99;
    }

    /* =============================================
        MAIN LAYOUT
       ============================================= */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
    }

    .summary-row {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .card {
      background-color: #1a1f2e;
      border: 1px solid #2a3044;
      border-radius: 12px;
      padding: 18px 20px;
    }

    .card-label {
      font-size: 12px;
      color: #6b7a99;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .card-value {
      font-size: 26px;
      font-weight: 700;
    }

    .card-value.yellow { color: #f5c542; }
    .card-value.green  { color: #34d399; }
    .card-value.red    { color: #f87171; }
    .card-value.blue   { color: #60a5fa; }

    /* =============================================
        PANELS & FORMS
       ============================================= */
    .left-panel, .right-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .panel {
      background-color: #1a1f2e;
      border: 1px solid #2a3044;
      border-radius: 12px;
      padding: 20px;
    }

    .panel-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #ffffff;
    }

    label {
      display: block;
      font-size: 12px;
      color: #6b7a99;
      margin-bottom: 5px;
      margin-top: 12px;
      text-transform: uppercase;
    }

    input, select {
      width: 100%;
      padding: 10px 12px;
      background-color: #0f1117;
      border: 1px solid #2a3044;
      border-radius: 8px;
      color: #e0e6f0;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      outline: none;
    }

    input:focus, select:focus { border-color: #f5c542; }

    .type-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 4px;
    }

    .type-btn {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #2a3044;
      background: transparent;
      color: #6b7a99;
      font-weight: 500;
      cursor: pointer;
    }

    .type-btn.is-expense { background-color: rgba(248, 113, 113, 0.15); border-color: #f87171; color: #f87171; }
    .type-btn.is-income { background-color: rgba(52, 211, 153, 0.15); border-color: #34d399; color: #34d399; }

    #add-btn {
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      background-color: #f5c542;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      color: #0f1117;
      cursor: pointer;
    }

    /* =============================================
        BUDGET & CHART
       ============================================= */
    .budget-bar-bg { background-color: #0f1117; border-radius: 6px; height: 8px; margin: 8px 0; overflow: hidden; }
    .budget-bar-fill { height: 8px; border-radius: 6px; background-color: #34d399; width: 0%; transition: width 0.5s ease; }
    .budget-footer { display: flex; justify-content: space-between; font-size: 12px; color: #6b7a99; }
    .chart-wrapper { height: 220px; position: relative; }

    /* =============================================
        TRANSACTION LIST & FILTERS
       ============================================= */
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
    .filter-btn { padding: 5px 14px; border-radius: 6px; border: 1px solid #2a3044; background: transparent; color: #6b7a99; font-size: 12px; cursor: pointer; }
    .filter-btn.active { background-color: rgba(245, 197, 66, 0.12); border-color: #f5c542; color: #f5c542; }

    .reset-btn { color: #f87171; border-color: rgba(248, 113, 113, 0.3); margin-left: auto; }
    .reset-btn:hover { background-color: rgba(248, 113, 113, 0.1); border-color: #f87171; }

    #search-box { width: 180px; padding: 5px 10px; font-size: 13px; margin-left: 8px; }

    .tx-list { display: flex; flex-direction: column; gap: 8px; max-height: 340px; overflow-y: auto; }
    .tx-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background-color: #0f1117; border: 1px solid #2a3044; border-radius: 10px; }
    .tx-icon { width: 40px; height: 40px; border-radius: 10px; background-color: #1a1f2e; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .tx-info { flex: 1; }
    .tx-name { font-size: 14px; font-weight: 600; }
    .tx-meta { font-size: 11px; color: #6b7a99; }
    .tx-amount { font-size: 15px; font-weight: 700; }
    .tx-amount.expense { color: #f87171; }
    .tx-amount.income  { color: #34d399; }
    .tx-delete { background: none; border: none; color: #3d4a63; cursor: pointer; padding: 4px 8px; }

    /* =============================================
        TOAST
       ============================================= */
    #toast { position: fixed; bottom: 24px; right: 24px; background-color: #1a1f2e; border: 1px solid #2a3044; border-radius: 10px; padding: 12px 20px; font-size: 13px; opacity: 0; transform: translateY(20px); transition: all 0.3s ease; pointer-events: none; }
    #toast.visible { opacity: 1; transform: translateY(0); }

    @media (max-width: 768px) { .container { grid-template-columns: 1fr; } .summary-row { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>

<header>
  <div class="logo">Spend<span>Sense</span></div>
  <div id="current-date"></div>
</header>

<div class="container">

  <div class="summary-row">
    <div class="card"><div class="card-label">Transactions</div><div class="card-value yellow" id="card-count">0</div></div>
    <div class="card"><div class="card-label">Income</div><div class="card-value green" id="card-income">0</div></div>
    <div class="card"><div class="card-label">Expenses</div><div class="card-value red" id="card-expense">0</div></div>
    <div class="card"><div class="card-label">Balance</div><div class="card-value blue" id="card-balance">0</div></div>
  </div>

  <div class="left-panel">
    <div class="panel">
      <div class="panel-title">Add Transaction</div>
      <div class="type-row">
        <button class="type-btn is-expense" id="btn-expense" onclick="selectType('expense')">- Expense</button>
        <button class="type-btn" id="btn-income" onclick="selectType('income')">+ Income</button>
      </div>
      <label>Description</label><input type="text" id="input-desc" placeholder="e.g. Lunch" />
      <label>Amount (Rs.)</label><input type="number" id="input-amount" placeholder="0" />
      <label>Category</label>
      <select id="input-category">
        <option value="food">Food</option><option value="transport">Transport</option>
        <option value="shopping">Shopping</option><option value="health">Health</option>
        <option value="education">Education</option><option value="entertainment">Entertainment</option>
        <option value="bills">Bills</option><option value="salary">Salary</option><option value="other">Other</option>
      </select>
      <label>Date</label><input type="date" id="input-date" />
      <button id="add-btn" onclick="addTransaction()">Add Transaction</button>
    </div>

    <div class="panel">
      <div class="budget-header" style="display:flex; justify-content: space-between; align-items: center;">
        <div class="panel-title" style="margin:0">Monthly Budget</div>
        <button onclick="editBudget()" style="background:none; border:none; color:#f5c542; cursor:pointer; text-decoration:underline; font-size:12px;">Edit</button>
      </div>
      <div class="budget-bar-bg" style="margin-top:14px"><div class="budget-bar-fill" id="budget-fill"></div></div>
      <div class="budget-footer"><span id="budget-spent">Rs.0 spent</span><span id="budget-limit">of Rs.10,000</span></div>
    </div>
  </div>

  <div class="right-panel">
    <div class="panel">
      <div class="panel-title">Spending by Category</div>
      <div class="chart-wrapper"><canvas id="pie-chart"></canvas></div>
    </div>

    <div class="panel">
      <div class="panel-title">All Transactions</div>
      <div class="filter-row">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('expense', this)">Expenses</button>
        <button class="filter-btn" onclick="setFilter('income', this)">Income</button>
        <input type="text" id="search-box" placeholder="Search..." oninput="showTransactions()" />
        <button class="filter-btn reset-btn" onclick="confirmReset()">Reset All</button>
      </div>
      <div class="tx-list" id="tx-list"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  var transactions = JSON.parse(localStorage.getItem("transactions") || "[]");
  var monthlyBudget = parseFloat(localStorage.getItem("budget") || "10000");
  var selectedType = "expense";
  var activeFilter = "all";
  var pieChart = null;

  var categoryIcons = { food: "🍔", transport: "🚌", shopping: "🛍️", health: "💊", education: "📚", entertainment: "🎮", bills: "🧾", salary: "💼", other: "📦" };
  var categoryLabels = { food: "Food", transport: "Transport", shopping: "Shopping", health: "Health", education: "Education", entertainment: "Entertainment", bills: "Bills", salary: "Salary", other: "Other" };

  document.addEventListener("DOMContentLoaded", function() {
    var today = new Date();
    document.getElementById("current-date").textContent = today.toLocaleDateString("en-IN", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
    document.getElementById("input-date").value = today.toISOString().split("T")[0];
    refreshUI();
  });

  function refreshUI() {
    updateSummaryCards();
    showTransactions();
    drawPieChart();
    updateBudgetBar();
  }

  function selectType(type) {
    selectedType = type;
    document.getElementById("btn-expense").className = type === "expense" ? "type-btn is-expense" : "type-btn";
    document.getElementById("btn-income").className = type === "income" ? "type-btn is-income" : "type-btn";
  }

  function addTransaction() {
    var description = document.getElementById("input-desc").value.trim();
    var amount = parseFloat(document.getElementById("input-amount").value);
    var category = document.getElementById("input-category").value;
    var date = document.getElementById("input-date").value;

    if (!description || isNaN(amount) || amount <= 0 || !date) {
      showToast("Please fill all fields correctly");
      return;
    }

    transactions.unshift({ id: Date.now(), description: description, amount: amount, category: category, date: date, type: selectedType });
    saveData();
    refreshUI();
    document.getElementById("input-desc").value = "";
    document.getElementById("input-amount").value = "";
    showToast("Transaction added!");
  }

  function deleteTransaction(id) {
    transactions = transactions.filter(function(tx) { return tx.id !== id; });
    saveData();
    refreshUI();
    showToast("Transaction deleted");
  }

  function confirmReset() {
    if (confirm("Are you sure you want to delete ALL transactions? This cannot be undone.")) {
      transactions = [];
      localStorage.removeItem("transactions");
      refreshUI();
      showToast("All data reset");
    }
  }

  function updateSummaryCards() {
    var now = new Date();
    var thisMonth = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0");
    var income = 0, expense = 0;

    transactions.forEach(tx => {
      if (tx.date.startsWith(thisMonth)) {
        if (tx.type === "income") income += tx.amount;
        else expense += tx.amount;
      }
    });

    document.getElementById("card-count").textContent = transactions.length;
    document.getElementById("card-income").textContent = "Rs." + formatNumber(income);
    document.getElementById("card-expense").textContent = "Rs." + formatNumber(expense);
    var balance = income - expense;
    var balEl = document.getElementById("card-balance");
    balEl.textContent = (balance < 0 ? "-Rs." : "Rs.") + formatNumber(Math.abs(balance));
    balEl.style.color = balance < 0 ? "#f87171" : "#60a5fa";
  }

  function showTransactions() {
    var listEl = document.getElementById("tx-list");
    var searchVal = document.getElementById("search-box").value.toLowerCase();
    var filtered = transactions.filter(tx => {
      var matchesFilter = activeFilter === "all" || tx.type === activeFilter;
      var matchesSearch = tx.description.toLowerCase().includes(searchVal) || categoryLabels[tx.category].toLowerCase().includes(searchVal);
      return matchesFilter && matchesSearch;
    });

    if (filtered.length === 0) {
      listEl.innerHTML = '<div style="text-align:center; padding:40px; color:#3d4a63;">No transactions found.</div>';
      return;
    }

    listEl.innerHTML = filtered.map(tx => `
      <div class="tx-item">
        <div class="tx-icon">${categoryIcons[tx.category] || "📦"}</div>
        <div class="tx-info">
          <div class="tx-name">${tx.description}</div>
          <div class="tx-meta">${formatDate(tx.date)} - ${categoryLabels[tx.category]}</div>
        </div>
        <div class="tx-amount ${tx.type}">${tx.type === 'expense' ? '-' : '+'}Rs.${formatNumber(tx.amount)}</div>
        <button class="tx-delete" onclick="deleteTransaction(${tx.id})">×</button>
      </div>
    `).join('');
  }

  function setFilter(filter, btn) {
    activeFilter = filter;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    showTransactions();
  }

  function drawPieChart() {
    var now = new Date(), thisMonth = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0");
    var totals = {};
    transactions.forEach(tx => {
      if (tx.type === "expense" && tx.date.startsWith(thisMonth)) {
        totals[tx.category] = (totals[tx.category] || 0) + tx.amount;
      }
    });

    var labels = Object.keys(totals).map(c => categoryLabels[c]);
    var amounts = Object.values(totals);
    var ctx = document.getElementById("pie-chart").getContext("2d");
    if (pieChart) pieChart.destroy();

    if (amounts.length === 0) {
      ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
      ctx.fillStyle = "#3d4a63"; ctx.textAlign = "center"; ctx.fillText("No expenses this month", ctx.canvas.width/2, ctx.canvas.height/2);
      return;
    }

    pieChart = new Chart(ctx, {
      type: "doughnut",
      data: { labels: labels, datasets: [{ data: amounts, backgroundColor: ["#f97316","#3b82f6","#a855f7","#10b981","#eab308","#ec4899","#ef4444"], borderWidth: 0 }] },
      options: { responsive: true, maintainAspectRatio: false, cutout: "70%", plugins: { legend: { position: "right", labels: { color: "#6b7a99", font: { size: 11 } } } } }
    });
  }

  function updateBudgetBar() {
    var spent = transactions.reduce((acc, tx) => {
      var thisMonth = new Date().getFullYear() + "-" + String(new Date().getMonth() + 1).padStart(2, "0");
      return (tx.type === "expense" && tx.date.startsWith(thisMonth)) ? acc + tx.amount : acc;
    }, 0);
    var percent = Math.min((spent / monthlyBudget) * 100, 100);
    var fill = document.getElementById("budget-fill");
    fill.style.width = percent + "%";
    fill.style.backgroundColor = percent > 90 ? "#f87171" : percent > 70 ? "#f5c542" : "#34d399";
    document.getElementById("budget-spent").textContent = "Rs." + formatNumber(spent) + " spent";
    document.getElementById("budget-limit").textContent = "of Rs." + formatNumber(monthlyBudget);
  }

  function editBudget() {
    var input = prompt("Enter monthly budget (Rs.):", monthlyBudget);
    if (input && !isNaN(input)) { monthlyBudget = parseFloat(input); localStorage.setItem("budget", monthlyBudget); updateBudgetBar(); }
  }

  function showToast(msg) {
    var t = document.getElementById("toast"); t.textContent = msg; t.classList.add("visible");
    setTimeout(() => t.classList.remove("visible"), 3000);
  }

  function saveData() { localStorage.setItem("transactions", JSON.stringify(transactions)); }
  function formatNumber(n) { return Number(n).toLocaleString("en-IN"); }
  function formatDate(s) { return new Date(s + "T00:00:00").toLocaleDateString("en-IN", { day: "numeric", month: "short" }); }
</script>
</body>
</html>
